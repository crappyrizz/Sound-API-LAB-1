<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Audio Control system</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="audio-console">
    <!---- custom animations ----->
    <div class="track-visual" id="visualizerContainer">
        <div class="track-overlay">
            <label for="audioFile" class="file-chooser-btn" id="fileChooserLabel">select audio file</label>
        </div>
        <input type="file" id="audioFile" accept="audio/*" hidden>
        <div class="vis-bars" id="visualBars"></div>
        <div class="track-footer">
            <span class="file-status" id="fileStatus"></span>
            <button class="ctrl-btn special remove-file-btn hidden" id="removeFileBtn" type="button">remove</button>
        </div>
    </div>

<!---- time display ---->
<div class="time-panel">
    <span class="current-time" id="currentTimeDisplay">00:00</span>
    <span class="duration-time" id="durationDisplay">00:00</span>
</div>

<!-- seek bar (progress control) -->
<div class="progress-area">
    <div class="scrub-label">
        <span></span>
        <span id="seekHint">drag to skip</span>
    </div>
    <input type="range" id="seekSlider" value="0" min="0" max="100" step="0.01">
</div>

<!---- core controls ---->
<div class="control-grid">
    <button class="ctrl-btn primary" id="playBtn">Play</button>
    <button class="ctrl-btn" id="pauseBtn">Pause</button>
    <button class="ctrl-btn special" id="muteBtn">Mute</button>
    <button class="ctrl-btn special" id="loopBtn">Loop Off</button>
</div>

<!---- volume slider and speed slider  ---->
<div class="mixer-section">
    <div class="control-group">
        <label>volume <span id="volumePercent" class="value-indicator">80%</span></label>
        <input type="range" id="volumeSlider" class="slider-knob" min="0" max="1" step="0.01" value="0.8">
    </div>
    <div class="control-group">
        <label>playback speed <span id="speedPercent" class="value-indicator">1.00x</span></label>
        <input type="range" id="speedSlider" class="slider-knob" min="0.5" max="2.0" step="0.01" value="1.0">
    </div>
</div>

<script src="style.js"></script>
</body>
</html>
